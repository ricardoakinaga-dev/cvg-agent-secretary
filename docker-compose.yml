services:
  # Redis for caching and state
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      default:
        aliases:
          - agent-secretary-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL for persistent storage
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_DB: cvg_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    expose:
      - "5432"
    networks:
      default:
        aliases:
          - agent-secretary-postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Optional local Qdrant vector store for standalone deployments
  qdrant:
    image: qdrant/qdrant:v1.12.4
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # CVG Secretary Agent
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3023:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@agent-secretary-postgres:5432/cvg_agent
      REDIS_URL: redis://agent-secretary-redis:6379
      KNOWLEDGE_VECTOR_STORE: qdrant
      QDRANT_URL: ${QDRANT_URL:-http://cvg-master-rag-qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-cvg_institucional}
      QDRANT_VECTOR_NAME: ${QDRANT_VECTOR_NAME:-dense}
      QDRANT_SPARSE_VECTOR_NAME: ${QDRANT_SPARSE_VECTOR_NAME:-sparse}
      QDRANT_PREFETCH_LIMIT: ${QDRANT_PREFETCH_LIMIT:-50}
      QDRANT_SCORE_THRESHOLD: ${QDRANT_SCORE_THRESHOLD:-0}
      QDRANT_READ_ONLY: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      CHATWOOT_API_URL: ${CHATWOOT_API_URL}
      CHATWOOT_API_TOKEN: ${CHATWOOT_API_TOKEN}
      CHATWOOT_ACCOUNT_ID: ${CHATWOOT_ACCOUNT_ID}
      CHATWOOT_WEBHOOK_SECRET: ${CHATWOOT_WEBHOOK_SECRET}
      API_ADMIN_TOKEN: ${API_ADMIN_TOKEN}
      HANDOFF_TIMEOUT_MINUTES: ${HANDOFF_TIMEOUT_MINUTES:-10}
      LOG_LEVEL: info
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - default
      - chatwoot_default
    command: npm start

volumes:
  redis_data:
  postgres_data:
  qdrant_data:

networks:
  chatwoot_default:
    external: true
